<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cypher.Matrix</title>
  
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for compiling JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Custom scrollbar to match the terminal theme */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #000; border-left: 1px solid #064e3b; }
    ::-webkit-scrollbar-thumb { background: #065f46; }
    ::-webkit-scrollbar-thumb:hover { background: #10b981; }
  </style>
</head>
<body class="bg-black text-green-500 font-mono">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- ICON COMPONENTS ---
    // Replacing lucide-react with inline SVGs so the file remains standalone
    const TerminalIcon = ({ className, size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
    );
    const LockIcon = ({ className, size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    );
    const UnlockIcon = ({ className, size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 9.9-1"></path></svg>
    );
    const InfoIcon = ({ className, size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
    );
    const XIcon = ({ className, size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    );
    const CrosshairIcon = ({ className, size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="18" y2="12"></line><line x1="6" y1="12" x2="2" y2="12"></line><line x1="12" y1="6" x2="12" y2="2"></line><line x1="12" y1="22" x2="12" y2="18"></line></svg>
    );

    // --- MAIN APP COMPONENT ---
    function App() {
      const [mode, setMode] = useState('encode');
      const [cipher, setCipher] = useState('polybius');
      const [inputs, setInputs] = useState({ encode: '', decode: '' });
      const inputText = inputs[mode] || '';
      const [shiftKey, setShiftKey] = useState(3);
      const [rails, setRails] = useState(3);
      const [activeChar, setActiveChar] = useState(null);
      const [showAbout, setShowAbout] = useState(false);
      const [customOutput, setCustomOutput] = useState('');
      const [userGuess, setUserGuess] = useState('');
      const [challengeIndex, setChallengeIndex] = useState(0);

      // TEACHERS: Add or modify challenges here! 
      // Make sure the "plain" text is all caps with NO SPACES.
      const CHALLENGES = {
        polybius: [
          { cipher: "15 33 24 22 32 11", plain: "ENIGMA" },
          { cipher: "43 15 13 42 15 44", plain: "SECRET" },
          { cipher: "23 11 13 25 15 42", plain: "HACKER" },
          { cipher: "32 11 44 42 24 53", plain: "MATRIX" },
          { cipher: "13 24 35 23 15 42", plain: "CIPHER" }
        ],
        caesar: [
          { cipher: "PDWULA", plain: "MATRIX" },    // Shift 3
          { cipher: "XDXFJR", plain: "SYSTEM" },    // Shift 5
          { cipher: "NOPOXN", plain: "DEFEND" },    // Shift 10
          { cipher: "WFAOVU", plain: "PYTHON" },    // Shift 7
          { cipher: "DAGFQD", plain: "ROUTER" }     // Shift 12
        ],
        atbash: [
          { cipher: "HSZWLD", plain: "SHADOW" },
          { cipher: "DRWTVG", plain: "WIDGET" },
          { cipher: "HVXFIV", plain: "SECURE" },
          { cipher: "HSRVOW", plain: "SHIELD" },
          { cipher: "MVGDLIP", plain: "NETWORK" }
        ],
        railfence: [
          { cipher: "DCD EOE", plain: "DECODE" },          // 2 rails
          { cipher: "HCE AKR", plain: "HACKER" },          // 2 rails
          { cipher: "SE ERT C", plain: "SECRET" },         // 3 rails
          { cipher: "CE IHR P", plain: "CIPHER" },         // 3 rails
          { cipher: "FL IAL RW E", plain: "FIREWALL" }     // 4 rails
        ]
      };

      const currentChallenge = CHALLENGES[cipher][challengeIndex];
      const isChallengeSolved = mode === 'challenge' && userGuess.toUpperCase().replace(/\s+/g, '') === currentChallenge.plain;

      // Clear the guess and reset index whenever the mode or cipher changes
      useEffect(() => {
        setUserGuess('');
        setChallengeIndex(0);
      }, [mode, cipher]);

      // Handle successful challenge completion
      useEffect(() => {
        if (isChallengeSolved) {
          const timer = setTimeout(() => {
            // Move to the next challenge, loop back to 0 if at the end
            setChallengeIndex((prev) => (prev + 1) % CHALLENGES[cipher].length);
            setUserGuess('');
          }, 2500); // Show "Access Granted" for 2.5 seconds
          
          return () => clearTimeout(timer); // Cleanup timer if component unmounts
        }
      }, [isChallengeSolved, cipher]);

      const cipherInfo = {
        polybius: {
          title: "Polybius Square",
          text: "Invented by the ancient Greek historian Polybius. It turns letters into numbers using a grid. It's a great way to learn about map coordinates (X and Y axes) because you find the row, then the column!"
        },
        caesar: {
          title: "Caesar Shift",
          text: "Used by Julius Caesar to send secret military messages. You simply 'shift' the alphabet over by a certain number. It's one of the oldest and simplest codes in history."
        },
        atbash: {
          title: "Atbash Cipher",
          text: "An ancient Hebrew cipher originally used with the Hebrew alphabet. It works by folding the alphabet in half: A becomes Z, B becomes Y, C becomes X. It's perfectly symmetrical!"
        },
        railfence: {
          title: "Rail Fence Cipher",
          text: "A 'transposition' cipher. Instead of swapping letters for other letters, it mixes up the order of the letters by writing them in a zig-zag pattern. A simple mistake ruins the whole message!"
        }
      };

      // The 5x5 Polybius Grid
      const polybiusGrid = [
        ['A', 'B', 'C', 'D', 'E'],
        ['F', 'G', 'H', 'I', 'K'], // J is usually combined with I
        ['L', 'M', 'N', 'O', 'P'],
        ['Q', 'R', 'S', 'T', 'U'],
        ['V', 'W', 'X', 'Y', 'Z']
      ];

      // Helper to find Polybius coordinates
      const getPolybiusCoords = (char) => {
        const upperChar = char.toUpperCase();
        const searchChar = upperChar === 'J' ? 'I' : upperChar; // Map J to I
        
        for (let r = 0; r < 5; r++) {
          for (let c = 0; c < 5; c++) {
            if (polybiusGrid[r][c] === searchChar) {
              return { row: r, col: c, code: `${r + 1}${c + 1}` };
            }
          }
        }
        return null;
      };

      // Update active character for visualization based on typing
      // NEW: Now watches 'userGuess' during challenge mode so the visualizer reacts!
      const textToWatch = mode === 'challenge' ? userGuess : inputText;
      useEffect(() => {
        if (textToWatch.length > 0) {
          const lastChar = textToWatch.slice(-1);
          setActiveChar(lastChar);
          
          // Clear the active highlight after a short delay for a "typing" effect
          const timer = setTimeout(() => setActiveChar(null), 800);
          return () => clearTimeout(timer);
        }
      }, [textToWatch]);

      // Encoding Logic
      const getOutputText = () => {
        if (!inputText) return '';
        const cleanInput = inputText.toUpperCase(); // Force uppercase for logic
        
        if (cipher === 'polybius') {
          if (mode === 'encode') {
            return cleanInput.split('').map(char => {
              if (/[A-Z]/.test(char)) {
                const coords = getPolybiusCoords(char);
                return coords ? coords.code : char;
              }
              return char;
            }).join(' ');
          } else {
            // Simple Polybius decode (assumes pairs of numbers)
            let output = '';
            let i = 0;
            const str = cleanInput.replace(/\s+/g, ''); // Remove spaces
            while (i < str.length) {
              const r = parseInt(str[i]) - 1;
              const c = parseInt(str[i+1]) - 1;
              if (!isNaN(r) && !isNaN(c) && r >= 0 && r < 5 && c >= 0 && c < 5) {
                output += polybiusGrid[r][c];
                i += 2;
              } else {
                output += str[i] || '';
                i++;
              }
            }
            return output;
          }
        }

        if (cipher === 'caesar') {
          const shift = mode === 'encode' ? shiftKey : -shiftKey;
          return cleanInput.split('').map(char => {
            if (/[A-Z]/.test(char)) {
              let newCharCode = ((char.charCodeAt(0) - 65 + shift) % 26);
              if (newCharCode < 0) newCharCode += 26; // Handle negative shifts
              return String.fromCharCode(newCharCode + 65);
            }
            return char;
          }).join('');
        }

        if (cipher === 'atbash') {
          return cleanInput.split('').map(char => {
            if (/[A-Z]/.test(char)) {
              return String.fromCharCode(90 - (char.charCodeAt(0) - 65));
            }
            return char;
          }).join('');
        }

        if (cipher === 'railfence') {
          const str = cleanInput.replace(/\s+/g, '');
          if (!str) return '';

          if (mode === 'encode') {
            const railsArr = Array.from({ length: rails }, () => []);
            let r = 0; let dir = 1;
            for (let i = 0; i < str.length; i++) {
              railsArr[r].push(str[i]);
              r += dir;
              if (r === 0 || r === rails - 1) dir *= -1;
            }
            return railsArr.map(row => row.join('')).join(' ');
          } else {
            // Decode rail fence
            const len = str.length;
            const railLengths = Array(rails).fill(0);
            let r = 0; let dir = 1;
            for (let i = 0; i < len; i++) {
              railLengths[r]++;
              r += dir;
              if (r === 0 || r === rails - 1) dir *= -1;
            }
            
            const railsArr = [];
            let index = 0;
            for (let i = 0; i < rails; i++) {
              railsArr.push(str.slice(index, index + railLengths[i]).split(''));
              index += railLengths[i];
            }

            let out = '';
            r = 0; dir = 1;
            for (let i = 0; i < len; i++) {
              out += railsArr[r].shift();
              r += dir;
              if (r === 0 || r === rails - 1) dir *= -1;
            }
            return out;
          }
        }

        return '';
      };

      const rawOutput = getOutputText();

      useEffect(() => {
        if (!inputText) {
          setCustomOutput('');
        } else {
          setCustomOutput(rawOutput);
        }
      }, [rawOutput, inputText]);

      const handleOutputChange = (e) => {
        const newVal = e.target.value.toUpperCase();
        
        const rawBase = rawOutput.replace(/\s+/g, '');
        const newBase = newVal.replace(/\s+/g, '');
        
        if (rawBase === newBase) {
          setCustomOutput(newVal);
        }
      };

      return (
        <div className="min-h-screen selection:bg-green-900 selection:text-green-100 flex flex-col items-center relative p-4 md:p-8">
          
          {/* About Modal */}
          {showAbout && (
            <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4">
              <div className="bg-green-950/90 border-2 border-green-500 p-6 max-w-lg w-full rounded-sm shadow-[0_0_30px_rgba(0,255,65,0.3)] relative">
                <button 
                  onClick={() => setShowAbout(false)}
                  className="absolute top-4 right-4 text-green-500 hover:text-white"
                >
                  <XIcon size={24} />
                </button>
                <div className="flex items-center gap-3 mb-4 border-b border-green-500 pb-2">
                  <InfoIcon className="text-green-400" />
                  <h2 className="text-2xl font-bold text-white">{cipherInfo[cipher].title}</h2>
                </div>
                <p className="text-green-300 text-lg leading-relaxed">
                  {cipherInfo[cipher].text}
                </p>
              </div>
            </div>
          )}

          {/* Header */}
          <header className="w-full max-w-4xl border-b border-green-700 pb-4 mb-8 flex items-center justify-between">
            <div className="flex items-center gap-3">
              <TerminalIcon size={32} className="animate-pulse" />
              <h1 className="text-3xl font-bold tracking-widest">CYPHER.MATRIX</h1>
            </div>
            <div className="text-xs text-green-700 hidden md:block">
              STATUS: SECURE // SYSTEM: ONLINE
            </div>
          </header>

          <main className="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            {/* Left Column: Controls */}
            <div className="col-span-1 space-y-6 bg-green-950/20 p-6 border border-green-800 rounded-lg">
              
              <div>
                <h2 className="text-xl mb-4 border-b border-green-800 pb-2">OPERATION</h2>
                <div className="flex flex-col gap-2">
                  <div className="flex gap-2">
                    <button 
                      onClick={() => setMode('encode')}
                      className={`flex-1 py-2 px-1 flex items-center justify-center gap-1 border transition-colors text-sm ${mode === 'encode' ? 'bg-green-500 text-black border-green-500' : 'border-green-800 hover:bg-green-900/50'}`}
                    >
                      <LockIcon size={14} /> ENCODE
                    </button>
                    <button 
                      onClick={() => setMode('decode')}
                      className={`flex-1 py-2 px-1 flex items-center justify-center gap-1 border transition-colors text-sm ${mode === 'decode' ? 'bg-green-500 text-black border-green-500' : 'border-green-800 hover:bg-green-900/50'}`}
                    >
                      <UnlockIcon size={14} /> DECODE
                    </button>
                  </div>
                  <button 
                    onClick={() => setMode('challenge')}
                    className={`w-full py-2 px-1 flex items-center justify-center gap-2 border transition-colors text-sm font-bold tracking-widest ${mode === 'challenge' ? 'bg-green-500 text-black border-green-500 shadow-[0_0_15px_rgba(0,255,65,0.4)]' : 'border-green-800 hover:bg-green-900/50 text-green-400'}`}
                  >
                    <CrosshairIcon size={16} /> CHALLENGE MODE
                  </button>
                </div>
              </div>

              <div>
                <h2 className="text-xl mb-4 border-b border-green-800 pb-2">PROTOCOL</h2>
                <div className="flex gap-2">
                  <select 
                    value={cipher}
                    onChange={(e) => {
                      setCipher(e.target.value);
                      setInputs({ encode: '', decode: '' });
                    }}
                    className="w-full bg-black border border-green-800 p-2 text-green-500 focus:outline-none focus:border-green-400 cursor-pointer"
                  >
                    <option value="polybius">Polybius Square (Grid)</option>
                    <option value="caesar">Caesar Shift</option>
                    <option value="atbash">Atbash Cipher</option>
                    <option value="railfence">Rail Fence</option>
                  </select>
                  <button 
                    onClick={() => setShowAbout(true)}
                    className="p-2 border border-green-800 hover:bg-green-900/50 text-green-400 flex-shrink-0 transition-colors"
                    title="About this Protocol"
                  >
                    <InfoIcon size={24} />
                  </button>
                </div>
              </div>

              {cipher === 'caesar' && (
                <div>
                  <h2 className="text-xl mb-4 border-b border-green-800 pb-2">KEY (SHIFT)</h2>
                  <input 
                    type="range" 
                    min="1" 
                    max="25" 
                    value={shiftKey}
                    onChange={(e) => setShiftKey(parseInt(e.target.value))}
                    className="w-full accent-green-500 cursor-pointer"
                  />
                  <div className="text-center mt-2 text-xl font-bold">Shift: {shiftKey}</div>
                </div>
              )}

              {cipher === 'railfence' && (
                <div>
                  <h2 className="text-xl mb-4 border-b border-green-800 pb-2">RAILS</h2>
                  <input 
                    type="range" 
                    min="2" 
                    max="5" 
                    value={rails}
                    onChange={(e) => setRails(parseInt(e.target.value))}
                    className="w-full accent-green-500 cursor-pointer"
                  />
                  <div className="text-center mt-2 text-xl font-bold">Rails: {rails}</div>
                </div>
              )}
            </div>

            {/* Right Column: Visualizer & I/O */}
            <div className="col-span-1 lg:col-span-2 space-y-6">
              
              {/* Visualizer Area */}
              <div className="bg-black border border-green-800 p-6 rounded-lg min-h-[250px] flex items-center justify-center relative overflow-hidden">
                <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-green-900/20 via-black to-black pointer-events-none"></div>
                
                {cipher === 'polybius' && (
                  <div className="relative z-10">
                    <div className="flex justify-center mb-2 text-green-700">
                      <span className="w-8"></span>
                      {[1, 2, 3, 4, 5].map(n => <span key={n} className="w-10 text-center font-bold">{n}</span>)}
                    </div>
                    {polybiusGrid.map((row, r) => (
                      <div key={r} className="flex justify-center items-center mb-1">
                        <span className="w-8 text-green-700 font-bold text-center">{r + 1}</span>
                        {row.map((letter, c) => {
                          const isActive = activeChar && getPolybiusCoords(activeChar)?.row === r && getPolybiusCoords(activeChar)?.col === c;
                          return (
                            <div 
                              key={c}
                              className={`w-10 h-10 border flex items-center justify-center m-1 text-lg transition-all duration-200 ${isActive ? 'bg-green-500 text-black border-green-500 scale-110 shadow-[0_0_15px_rgba(0,255,65,0.7)]' : 'border-green-800/50'}`}
                            >
                              {letter}
                            </div>
                          )
                        })}
                      </div>
                    ))}
                  </div>
                )}

                {cipher === 'caesar' && (
                  <div className="relative z-10 w-full overflow-x-auto pb-4 custom-scrollbar">
                    <div className="flex gap-1 min-w-max px-4 mb-2">
                      <span className="w-16 text-green-700 mr-2">PLAIN:</span>
                      {'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map((l, i) => (
                        <div key={i} className={`w-8 h-8 border border-green-800/50 flex items-center justify-center ${activeChar?.toUpperCase() === l ? 'bg-green-500 text-black shadow-[0_0_10px_rgba(0,255,65,0.7)]' : ''}`}>
                          {l}
                        </div>
                      ))}
                    </div>
                    <div className="flex gap-1 min-w-max px-4">
                      <span className="w-16 text-green-700 mr-2">CIPHER:</span>
                      {'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map((l, i) => {
                        const shiftedChar = String.fromCharCode(((i + shiftKey) % 26) + 65);
                        const isTarget = activeChar && String.fromCharCode(((activeChar.toUpperCase().charCodeAt(0) - 65 + shiftKey) % 26) + 65) === shiftedChar && activeChar.match(/[a-zA-Z]/);
                        
                        return (
                          <div key={i} className={`w-8 h-8 border flex items-center justify-center ${isTarget && mode === 'encode' ? 'bg-green-500 text-black shadow-[0_0_10px_rgba(0,255,65,0.7)]' : 'border-green-800/50 text-green-300'}`}>
                            {shiftedChar}
                          </div>
                        )
                      })}
                    </div>
                  </div>
                )}

                {cipher === 'atbash' && (
                  <div className="relative z-10 w-full overflow-x-auto pb-4 flex flex-col items-center custom-scrollbar">
                    <div className="flex gap-1 min-w-max px-4 mb-2">
                      <span className="w-20 text-green-700 mr-2 text-right">A-Z:</span>
                      {'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').map((l, i) => {
                        const isTarget = activeChar?.toUpperCase() === l;
                        return (
                          <div key={i} className={`w-8 h-8 border flex items-center justify-center transition-all ${isTarget ? 'bg-green-500 text-black shadow-[0_0_10px_rgba(0,255,65,0.7)] scale-110' : 'border-green-800/50'}`}>
                            {l}
                          </div>
                        );
                      })}
                    </div>
                    <div className="flex gap-1 min-w-max px-4">
                      <span className="w-20 text-green-700 mr-2 text-right">Z-A:</span>
                      {'ZYXWVUTSRQPONMLKJIHGFEDCBA'.split('').map((l, i) => {
                        const isTarget = activeChar && String.fromCharCode(90 - (activeChar.toUpperCase().charCodeAt(0) - 65)) === l && activeChar.match(/[a-zA-Z]/);
                        return (
                          <div key={i} className={`w-8 h-8 border flex items-center justify-center transition-all ${isTarget ? 'bg-green-500 text-black shadow-[0_0_10px_rgba(0,255,65,0.7)] scale-110' : 'border-green-800/50 text-green-300'}`}>
                            {l}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {cipher === 'railfence' && (
                  <div className="relative z-10 w-full overflow-x-auto p-4 flex justify-center custom-scrollbar">
                    <div className="inline-flex flex-col gap-1">
                      {Array.from({ length: rails }).map((_, r) => {
                        // NEW: Switch to challenge mode data if active
                        let strToVisualize = inputText.replace(/\s+/g, '').toUpperCase();
                        let targetLength = 0;
                        
                        if (mode === 'challenge') {
                          strToVisualize = userGuess.replace(/\s+/g, '').toUpperCase();
                          targetLength = currentChallenge.cipher.replace(/\s+/g, '').length;
                        }

                        let currRow = 0; let dir = 1;
                        const rowChars = [];
                        // Make sure we draw enough grid for the challenge length
                        const displayLength = Math.max(strToVisualize.length, targetLength, 15);
                        
                        for (let i = 0; i < displayLength; i++) {
                          const char = strToVisualize[i];
                          const isActive = i === strToVisualize.length - 1 && activeChar;
                          
                          if (currRow === r) {
                            // Identify empty target slots for the challenge mode framework
                            const isChallengeTarget = mode === 'challenge' && i < targetLength && !char;
                            
                            rowChars.push(
                              <div key={i} className={`w-8 h-8 border flex items-center justify-center ${char ? (isActive ? 'bg-green-500 text-black shadow-[0_0_10px_rgba(0,255,65,0.7)] font-bold' : 'border-green-400 text-green-100') : (isChallengeTarget ? 'border-green-500/50 text-green-500/50 border-dashed bg-green-950/30 font-bold' : 'border-green-800/30 text-transparent')}`}>
                                {char || (isChallengeTarget ? '?' : '-')}
                              </div>
                            );
                          } else {
                            rowChars.push(
                              <div key={i} className="w-8 h-8 flex items-center justify-center text-green-900/40">
                                ·
                              </div>
                            );
                          }
                          
                          currRow += dir;
                          if (currRow === 0 || currRow === rails - 1) dir *= -1;
                        }
                        
                        return (
                          <div key={r} className="flex gap-1">
                            <span className="w-8 text-green-700 font-bold self-center text-sm">R{r+1}</span>
                            {rowChars}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>

              {/* Input / Output Area */}
              {mode === 'challenge' ? (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="relative">
                    <label className="block text-green-700 mb-2 font-bold flex justify-between">
                      <span className="animate-pulse">INTERCEPTED TRANSMISSION</span>
                      <span className="text-green-500">MISSION {challengeIndex + 1}/{CHALLENGES[cipher].length}</span>
                    </label>
                    <div className="w-full h-32 bg-green-950/40 border border-green-500/50 p-3 text-green-300 font-mono uppercase flex items-center justify-center text-2xl tracking-widest text-center shadow-[inset_0_0_15px_rgba(0,255,65,0.1)]">
                      {currentChallenge.cipher}
                    </div>
                  </div>
                  <div>
                    <label className="block text-green-700 mb-2">ENTER DECRYPTION</label>
                    <div className="relative">
                      <textarea 
                        value={userGuess}
                        onChange={(e) => setUserGuess(e.target.value.toUpperCase())}
                        disabled={isChallengeSolved}
                        placeholder="CRACK THE CODE..."
                        className={`w-full h-32 p-3 focus:outline-none resize-none font-mono uppercase text-xl text-center flex items-center justify-center transition-all ${isChallengeSolved ? 'bg-green-500 text-black border-2 border-green-400 shadow-[0_0_20px_rgba(0,255,65,0.6)]' : 'bg-green-950/10 border border-green-800 text-green-400 focus:border-green-500 focus:ring-1 focus:ring-green-500'}`}
                      />
                      {isChallengeSolved && (
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none bg-green-500/10 backdrop-blur-sm z-10">
                          <span className="bg-black text-green-500 px-4 py-2 border-2 border-green-500 font-bold tracking-widest text-xl shadow-[0_0_20px_rgba(0,255,65,1)]">
                            ACCESS GRANTED
                          </span>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-green-700 mb-2">INPUT TEXT</label>
                    <textarea 
                      value={inputText}
                      onChange={(e) => setInputs({ ...inputs, [mode]: e.target.value.toUpperCase() })}
                      placeholder="TYPE TRANSMISSION HERE..."
                      className="w-full h-32 bg-green-950/10 border border-green-800 p-3 text-green-400 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 resize-none font-mono uppercase"
                    />
                  </div>
                  <div>
                    <div className="flex justify-between items-end mb-2">
                      <label className="block text-green-700">OUTPUT TEXT</label>
                    </div>
                    <textarea 
                      value={customOutput}
                      onChange={handleOutputChange}
                      placeholder="AWAITING TRANSMISSION..."
                      className="w-full h-32 bg-green-950/30 border border-green-800 p-3 text-green-500 focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400 resize-none font-mono uppercase"
                    />
                  </div>
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
